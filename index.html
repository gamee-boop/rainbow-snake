<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rainbow Snake - Fun Game</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b6b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rainbow Snake">
<meta name="description" content="Colorful snake game - eat fruits, grow bigger, beat your score!">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0c29;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  /* Floating bubbles background */
  .bubbles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    opacity: 0.15;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0.15; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }
  }

  .game-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem;
    background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    letter-spacing: 2px;
    animation: rainbowShift 3s linear infinite;
    background-size: 200%;
  }
  @keyframes rainbowShift {
    0% { background-position: 0%; }
    100% { background-position: 200%; }
  }

  .scoreboard {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .score-box {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 8px 20px;
    text-align: center;
    color: white;
  }
  .score-box .label {
    font-size: 0.7rem;
    opacity: 0.7;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .score-box .value {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: #ffd93d;
  }

  .canvas-container {
    position: relative;
    border-radius: 24px;
    padding: 4px;
    background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff, #ff6b6b);
    background-size: 300%;
    animation: borderSpin 4s linear infinite;
    box-shadow: 0 0 40px rgba(255, 107, 107, 0.4), 0 0 80px rgba(77, 150, 255, 0.2);
  }
  @keyframes borderSpin {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  canvas {
    display: block;
    border-radius: 20px;
    background: #1a1a2e;
  }

  /* Overlay screens */
  .overlay {
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border-radius: 20px;
    background: rgba(15, 12, 41, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    backdrop-filter: blur(4px);
    z-index: 10;
    transition: opacity 0.3s;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }

  .overlay-emoji {
    font-size: 5rem;
    animation: bounce 0.6s ease infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-12px); }
  }

  .overlay h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: white;
  }
  .overlay p {
    color: rgba(255,255,255,0.6);
    font-size: 1rem;
    text-align: center;
    line-height: 1.6;
  }

  .btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    padding: 14px 40px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
  }
  .btn:active { transform: scale(0.95); }
  .btn-primary {
    background: linear-gradient(135deg, #ff6b6b, #ffd93d);
    color: #1a1a2e;
    box-shadow: 0 8px 25px rgba(255, 107, 107, 0.5);
  }
  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(255, 107, 107, 0.6);
  }

  /* Mobile Controls */
  .mobile-controls {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }
  .ctrl-row { display: flex; gap: 6px; }
  .ctrl-btn {
    width: 56px; height: 56px;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active {
    background: rgba(255,255,255,0.3);
    transform: scale(0.92);
  }

  @media (max-width: 520px) {
    h1 { font-size: 2rem; }
    .mobile-controls { display: flex; }
    canvas { width: 320px !important; height: 320px !important; }
  }

  .hint {
    color: rgba(255,255,255,0.35);
    font-size: 0.8rem;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="bubbles" id="bubbles"></div>

<div class="game-wrapper">
  <h1>🐍 Rainbow Snake</h1>

  <div class="scoreboard">
    <div class="score-box">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="label">Best</div>
      <div class="value" id="best">0</div>
    </div>
    <div class="score-box">
      <div class="label">Level</div>
      <div class="value" id="level">1</div>
    </div>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
      <div class="overlay-emoji">🐍</div>
      <h2>Rainbow Snake</h2>
      <p>Khao, bado, aur survive karo!<br>Arrow keys ya swipe se control karo.</p>
      <button class="btn btn-primary" onclick="startGame()">Khelna Shuru Karo!</button>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
      <div class="overlay-emoji">💀</div>
      <h2>Game Over!</h2>
      <p id="finalScore">Score: 0</p>
      <button class="btn btn-primary" onclick="startGame()">Dobara Khelo!</button>
    </div>
  </div>

  <!-- Mobile Controls -->
  <div class="mobile-controls">
    <div class="ctrl-row">
      <div class="ctrl-btn" ontouchstart="setDir(0,-1)" onclick="setDir(0,-1)">⬆️</div>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-btn" ontouchstart="setDir(-1,0)" onclick="setDir(-1,0)">⬅️</div>
      <div class="ctrl-btn" ontouchstart="setDir(0,1)" onclick="setDir(0,1)">⬇️</div>
      <div class="ctrl-btn" ontouchstart="setDir(1,0)" onclick="setDir(1,0)">➡️</div>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:16px;">
    <p class="hint">⌨️ Arrow Keys / WASD • 📱 Swipe or Buttons</p>
    <button id="soundBtn" onclick="toggleSound()" style="
      background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);
      border-radius:12px;color:white;font-size:1rem;padding:6px 14px;
      cursor:pointer;font-family:'Nunito',sans-serif;transition:background 0.2s;white-space:nowrap;">
      🔊 ON
    </button>
  </div>
</div>

<script>
// ===== SOUND SYSTEM (Web Audio API - no files needed!) =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let musicPlaying = false;
let musicNodes = [];
let soundEnabled = true;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

// Eat food sound - happy "bloop"
function playEatSound() {
  if (!soundEnabled) return;
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    const now = ac.currentTime;
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
    osc.frequency.exponentialRampToValueAtTime(600, now + 0.18);
    gain.gain.setValueAtTime(0.35, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    osc.start(now); osc.stop(now + 0.25);
  } catch(e) {}
}

// Level up sound - fanfare
function playLevelUpSound() {
  if (!soundEnabled) return;
  try {
    const ac = getAudioCtx();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'triangle';
      const t = ac.currentTime + i * 0.1;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.start(t); osc.stop(t + 0.2);
    });
  } catch(e) {}
}

// Game over sound - descending sad
function playGameOverSound() {
  if (!soundEnabled) return;
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sawtooth';
    const now = ac.currentTime;
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.6);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    osc.start(now); osc.stop(now + 0.6);
  } catch(e) {}
}

// Move tick sound - subtle click
function playMoveSound() {
  if (!soundEnabled) return;
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'square';
    const now = ac.currentTime;
    osc.frequency.setValueAtTime(120, now);
    gain.gain.setValueAtTime(0.04, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
    osc.start(now); osc.stop(now + 0.04);
  } catch(e) {}
}

// Background music - looping chiptune melody
function startMusic() {
  if (!soundEnabled || musicPlaying) return;
  try {
    const ac = getAudioCtx();
    musicPlaying = true;

    // Simple looping melody notes (frequencies, durations)
    const melody = [
      [523,0.2],[587,0.2],[659,0.2],[698,0.2],
      [784,0.4],[698,0.2],[659,0.2],
      [587,0.4],[523,0.4],
      [440,0.2],[494,0.2],[523,0.2],[587,0.2],
      [659,0.4],[587,0.2],[523,0.2],
      [494,0.4],[440,0.8],
    ];

    function playMelody(startTime) {
      if (!musicPlaying) return;
      let t = startTime;
      melody.forEach(([freq, dur]) => {
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = 'square';
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.06, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.9);
        osc.start(t); osc.stop(t + dur);
        musicNodes.push(osc);
        t += dur;
      });
      // Loop after total duration
      const total = melody.reduce((s,[,d]) => s+d, 0);
      setTimeout(() => { if(musicPlaying) playMelody(ac.currentTime); }, (total - 0.1) * 1000);
    }
    playMelody(ac.currentTime);
  } catch(e) {}
}

function stopMusic() {
  musicPlaying = false;
  musicNodes.forEach(n => { try { n.stop(); } catch(e) {} });
  musicNodes = [];
}

// ===== Bubbles background
const bubblesEl = document.getElementById('bubbles');
const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f43'];
for(let i = 0; i < 18; i++) {
  const b = document.createElement('div');
  b.className = 'bubble';
  const size = Math.random() * 60 + 20;
  b.style.cssText = `
    width:${size}px; height:${size}px;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    left:${Math.random()*100}%;
    animation-duration:${Math.random()*8+6}s;
    animation-delay:${Math.random()*8}s;
  `;
  bubblesEl.appendChild(b);
}

// Game Setup
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;

let snake, dir, nextDir, food, score, best, level, gameLoop, running;

const snakeColors = ['#ff6b6b','#ff9f43','#ffd93d','#6bcb77','#4d96ff','#c77dff'];
const foodEmojis = ['🍎','🍊','🍋','🍇','🫐','🍓','🍑','🥝'];

let currentFood = { x: 0, y: 0, emoji: '🍎' };
let particles = [];

function initGame() {
  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  level = 1;
  particles = [];
  best = parseInt(localStorage.getItem('snakeBest') || '0');
  updateUI();
  spawnFood();
}

function spawnFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  currentFood = {
    x: pos.x, y: pos.y,
    emoji: foodEmojis[Math.floor(Math.random() * foodEmojis.length)]
  };
}

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  stopMusic();
  initGame();
  running = true;
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(tick, getSpeed());
  startMusic();
}

function getSpeed() {
  return Math.max(80, 160 - (level - 1) * 15);
}

function tick() {
  dir = { ...nextDir };

  const head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame(); return;
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  // Eat food
  if (head.x === currentFood.x && head.y === currentFood.y) {
    const prevLevel = level;
    score += 10 * level;
    if (score > best) { best = score; localStorage.setItem('snakeBest', best); }
    level = Math.floor(score / 100) + 1;
    spawnFood();
    spawnParticles(head.x * CELL + CELL/2, head.y * CELL + CELL/2);
    if (level > prevLevel) { playLevelUpSound(); } else { playEatSound(); }
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, getSpeed());
  } else {
    snake.pop();
    playMoveSound();
  }

  updateUI();
  draw();
}

function spawnParticles(x, y) {
  for(let i = 0; i < 10; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      life: 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: Math.random() * 8 + 4
    });
  }
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('level').textContent = level;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  for(let x = 0; x < COLS; x++) {
    for(let y = 0; y < ROWS; y++) {
      ctx.beginPath();
      ctx.arc(x * CELL + CELL/2, y * CELL + CELL/2, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.9; p.vy *= 0.9;
    p.life -= 0.06;
  });

  // Snake
  snake.forEach((seg, i) => {
    const colorIdx = i % snakeColors.length;
    const color = snakeColors[colorIdx];
    const x = seg.x * CELL;
    const y = seg.y * CELL;
    const pad = i === 0 ? 1 : 2;

    // Glow effect for head
    if (i === 0) {
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 15;
    }

    // Rounded rect segment
    ctx.fillStyle = color;
    roundRect(ctx, x + pad, y + pad, CELL - pad*2, CELL - pad*2, i === 0 ? 6 : 5);
    ctx.fill();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    roundRect(ctx, x + pad + 2, y + pad + 2, CELL - pad*2 - 6, 4, 2);
    ctx.fill();

    if (i === 0) {
      ctx.restore();
      // Eyes
      ctx.fillStyle = 'white';
      const ex1 = dir.x === 0 ? x + 5 : (dir.x > 0 ? x + 12 : x + 4);
      const ey1 = dir.y === 0 ? y + 5 : (dir.y > 0 ? y + 12 : y + 4);
      ctx.beginPath(); ctx.arc(ex1, ey1, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath(); ctx.arc(ex1, ey1, 1.5, 0, Math.PI*2); ctx.fill();
    }
  });

  // Food
  ctx.save();
  ctx.shadowColor = '#ffd93d';
  ctx.shadowBlur = 20;
  ctx.font = `${CELL + 4}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const pulse = 1 + Math.sin(Date.now() / 300) * 0.08;
  ctx.translate(currentFood.x * CELL + CELL/2, currentFood.y * CELL + CELL/2);
  ctx.scale(pulse, pulse);
  ctx.fillText(currentFood.emoji, 0, 1);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function endGame() {
  running = false;
  clearInterval(gameLoop);
  stopMusic();
  playGameOverSound();
  document.getElementById('finalScore').textContent =
    `Tumhara Score: ${score} 🏆 Best: ${best}`;
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

function setDir(x, y) {
  if (!running) return;
  if (x === 1 && dir.x === -1) return;
  if (x === -1 && dir.x === 1) return;
  if (y === 1 && dir.y === -1) return;
  if (y === -1 && dir.y === 1) return;
  nextDir = { x, y };
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundBtn');
  if (soundEnabled) {
    btn.textContent = '🔊 ON';
    if (running) startMusic();
  } else {
    btn.textContent = '🔇 OFF';
    stopMusic();
  }
}

// Keyboard
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': e.preventDefault(); setDir(0, -1); break;
    case 'ArrowDown': case 's': case 'S': e.preventDefault(); setDir(0, 1); break;
    case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); setDir(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDir(1, 0); break;
  }
});

// Touch / Swipe
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    setDir(dx > 0 ? 1 : -1, 0);
  } else {
    setDir(0, dy > 0 ? 1 : -1);
  }
  touchStart = null;
  e.preventDefault();
}, { passive: false });

// Continuous draw for animations
function animLoop() {
  if (running) draw();
  requestAnimationFrame(animLoop);
}
animLoop();

// Register Service Worker (PWA)
